apiVersion: apps/v1
kind: Deployment
metadata:
  name: ufology-app
  namespace: ufology
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ufology-app
  template:
    metadata:
      labels:
        app: ufology-app
    spec:
      containers:
        - name: ufology-app
          image: andersonard/ufo-tracker:1.0
          ports:
            - containerPort: 8080
          env:
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_NAME

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DB_PASSWORD
            - name: DB_HOST
              value: "ufology-db-service"
            - name: DB_USER
              value: "postgres"

            - name: REDIS_HOST
              value: "ufology-redis-service"

            - name: REDIS_PORT
              value: "6379"
