apiVersion: apps/v1
kind: Deployment
metadata:
  name: ufology-redis
  namespace: ufology
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ufology-redis
  template:
    metadata:
      labels:
        app: ufology-redis
    spec:
      containers:
        - name: redis
          image: redis:alpine
          ports:
            - containerPort: 6379